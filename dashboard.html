<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">

<div class="container">

<aside class="sidebar">
    <h2>CyberShield</h2>
    <nav>
        <a class="active">Dashboard</a>
        <a>Alertas</a>
        <a>Logs</a>
    </nav>
</aside>

<main class="main">

<header class="topbar">
    <h1>Dashboard</h1>
    <button onclick="logout()">Logout</button>
</header>

<section class="metrics">
    <div class="card"><h3>Ameaças</h3><p id="threats">...</p></div>
    <div class="card"><h3>Eventos</h3><p id="events">...</p></div>
</section>

<section class="chart">
    <canvas id="chartCanvas"></canvas>
</section>

<section class="logs">
    <h2>Logs</h2>
    <ul id="logs"></ul>
</section>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
