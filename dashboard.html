<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dashboard">

<div class="layout">

    <aside class="sidebar">
        <h2>CyberShield</h2>
        <nav>
            <a class="nav-link active" onclick="showSection('dashboard')">Dashboard</a>
            <a class="nav-link" onclick="showSection('alerts')">Alertas</a>
            <a class="nav-link" onclick="showSection('logs')">Logs</a>
        </nav>
    </aside>

    <main class="content">

        <!-- DASHBOARD -->
        <section id="dashboardSection">

            <div class="topbar">
                <h1>Dashboard</h1>
                <button onclick="logout()">Logout</button>
            </div>

            <div class="cards">
                <div class="card">
                    <h3>Ameaças</h3>
                    <p id="threats">0</p>
                </div>

                <div class="card">
                    <h3>Eventos</h3>
                    <p id="events">0</p>
                </div>
            </div>

            <div class="card chart-card">
                <h3>Atividade</h3>
                <canvas id="activityChart"></canvas>
            </div>

        </section>

        <!-- ALERTAS -->
        <section id="alertsSection" class="hidden">
            <h2>Alertas</h2>
            <div class="card">
                <ul id="alertList"></ul>
            </div>
        </section>

        <!-- LOGS -->
        <section id="logsSection" class="hidden">
            <h2>Logs</h2>
            <div class="card">
                <ul id="logList"></ul>
            </div>
        </section>

    </main>

</div>

<script src="script.js"></script>
</body>
</html>
