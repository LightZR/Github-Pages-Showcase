<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard">

<div class="layout">

    <aside class="sidebar">
        <h2>CyberShield</h2>
        <nav>
            <a class="active">Dashboard</a>
            <a>Alertas</a>
            <a>Logs</a>
        </nav>
    </aside>

    <main class="content">

        <div class="topbar">
            <h1>Dashboard</h1>
            <button onclick="logout()">Logout</button>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Ameaças</h3>
                <p id="threats">0</p>
            </div>

            <div class="card">
                <h3>Eventos</h3>
                <p id="events">0</p>
            </div>
        </div>

        <div class="logs">
            <h2>Logs</h2>
            <ul id="logList"></ul>
        </div>

    </main>

</div>

<script src="script.js"></script>
</body>
</html>
